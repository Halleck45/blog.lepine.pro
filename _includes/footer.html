<div class="text-black text-xs text-center my-8">
  <p>
    © {{ site.theme.name }}, 2010 - {{ 'now'  | date: "%Y" }}
    <span class="mx-1.5 text-slate-300">·</span>
    <a href="/atom.xml" class="text-slate-500 hover:text-amber-600 hover:no-underline">{% if page and page.language == "en" %}RSS feed{% else %}Flux RSS{% endif %}</a>
  </p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>

<!-- Tracking des clics sur les cartes CTA (OctoFirst / Malt / Sponsor) vers GA4 -->
<script>
  document.addEventListener('click', function (e) {
    var el = e.target.closest('[data-cta]');
    if (!el || typeof gtag !== 'function') return;
    gtag('event', 'cta_click', {
      cta_id: el.getAttribute('data-cta'),
      link_url: el.href
    });
  });
</script>
