{% if page.suggestions and page.suggestions.size > 0 %}
<div class="mb-8 rounded-xl border border-slate-200 bg-gradient-to-br from-slate-50 via-white to-slate-50 p-8 shadow-sm">
  <p class="text-2xl font-bold text-slate-900">Pour aller plus loin</p>
  <div class="mt-6 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
    {% for suggestion in page.suggestions %}
    <a href="{{ suggestion.link }}" class="group flex items-start gap-3 rounded-lg border border-slate-100 bg-white p-4 shadow-sm transition hover:border-amber-200 hover:shadow-md hover:no-underline">
      <span class="mt-0.5 text-amber-500">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
        </svg>
      </span>
      <span class="text-sm font-medium text-slate-700 group-hover:text-amber-700">{{ suggestion.title }}</span>
    </a>
    {% endfor %}
  </div>
</div>
{% endif %}
